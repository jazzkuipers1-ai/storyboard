<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Storyboard — Sign in</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
<style>
  body { display: flex; align-items: center; justify-content: center; height: 100vh; background: var(--bg-sunk); }
  .login-card {
    width: 380px;
    background: var(--bg-elev);
    border: 1px solid var(--line);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-lg);
    padding: 32px 30px 26px;
  }
  .login-logo {
    width: 40px; height: 40px;
    border-radius: 9px;
    background: var(--ink);
    color: var(--bg-elev);
    display: inline-flex; align-items: center; justify-content: center;
    font-family: var(--serif); font-style: italic; font-size: 24px;
    margin-bottom: 16px;
  }
  .login-card h1 { font-family: var(--serif); font-weight: 400; font-size: 26px; margin: 0 0 4px; }
  .login-card p.sub { color: var(--ink-3); font-size: 13px; margin: 0 0 22px; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 12px; color: var(--ink-2); font-weight: 500; margin-bottom: 6px; }
  .field input {
    width: 100%; box-sizing: border-box;
    border: 1px solid var(--line); background: var(--bg);
    border-radius: 8px; padding: 10px 12px; font-size: 13.5px;
    outline: none; color: var(--ink);
  }
  .field input:focus { border-color: var(--ink-3); }
  .login-btn {
    width: 100%; margin-top: 6px;
    background: var(--ink); color: var(--bg-elev);
    border: 0; border-radius: 8px; padding: 11px;
    font-size: 13.5px; font-weight: 600; cursor: pointer;
  }
  .login-btn:hover { background: var(--ink-2); }
  .login-err {
    display: none; margin-top: 10px;
    font-size: 12.5px; color: var(--danger);
    background: color-mix(in oklch, var(--danger) 10%, transparent);
    border-radius: 6px; padding: 8px 10px;
  }
  .login-hint {
    margin-top: 18px; padding-top: 16px; border-top: 1px solid var(--line-soft);
    font-size: 11.5px; color: var(--ink-3);
  }
  .login-hint code { font-family: var(--mono); background: var(--bg-sunk); padding: 1px 5px; border-radius: 4px; }
</style>
</head>
<body>
  <form class="login-card" id="loginForm">
    <div class="login-logo">S</div>
    <h1>Storyboard</h1>
    <p class="sub">Sign in to access your location boards</p>
    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="you@production.com" value="mira@camino-productions.com" required />
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••" required />
    </div>
    <button type="submit" class="login-btn">Sign in</button>
    <div class="login-err" id="err">Incorrect password. Try again.</div>
    <div class="login-hint">Prototype access — password is <code>camino2026</code></div>
  </form>

  <script>
    document.getElementById('loginForm').addEventListener('submit', function (e) {
      e.preventDefault();
      const pw = document.getElementById('password').value;
      const err = document.getElementById('err');
      if (pw === 'camino2026') {
        sessionStorage.setItem('sb_auth', '1');
        window.location.href = 'dashboard.html';
      } else {
        err.style.display = 'block';
      }
    });
  </script>
</body>
</html>
