<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Storyboard — Reset password</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#1B1A17" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
<link rel="icon" href="icons/icon-192.png" type="image/png" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="supabase.js"></script>
<style>
  body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--bg-sunk); padding: 16px; box-sizing: border-box; }
  .login-card { width: 380px; max-width: 100%; background: var(--bg-elev); border: 1px solid var(--line); border-radius: var(--radius-lg); box-shadow: var(--shadow-lg); padding: 32px 30px 26px; box-sizing: border-box; }
  .login-logo { width: 40px; height: 40px; border-radius: 9px; background: var(--ink); color: var(--bg-elev); display: inline-flex; align-items: center; justify-content: center; font-family: var(--serif); font-style: italic; font-size: 24px; margin-bottom: 16px; }
  .login-card h1 { font-family: var(--serif); font-weight: 400; font-size: 26px; margin: 0 0 4px; }
  .login-card p.sub { color: var(--ink-3); font-size: 13px; margin: 0 0 20px; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 12px; color: var(--ink-2); font-weight: 500; margin-bottom: 6px; }
  .field input { width: 100%; box-sizing: border-box; border: 1px solid var(--line); background: var(--bg); border-radius: 8px; padding: 10px 12px; font-size: 13.5px; outline: none; color: var(--ink); }
  .field input:focus { border-color: var(--ink-3); }
  .login-btn { width: 100%; margin-top: 6px; background: var(--ink); color: var(--bg-elev); border: 0; border-radius: 8px; padding: 11px; font-size: 13.5px; font-weight: 600; cursor: pointer; }
  .login-btn:hover { background: var(--ink-2); }
  .login-btn:disabled { opacity: .6; cursor: default; }
  .login-err { display: none; margin-top: 10px; font-size: 12.5px; color: var(--danger); background: color-mix(in oklch, var(--danger) 10%, transparent); border-radius: 6px; padding: 8px 10px; }
  .login-ok { display: none; margin-top: 10px; font-size: 12.5px; color: var(--success); background: color-mix(in oklch, var(--success) 10%, transparent); border-radius: 6px; padding: 8px 10px; }
</style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">S</div>
    <h1>Set a new password</h1>
    <p class="sub" id="subtext">Checking your reset link…</p>

    <form id="resetForm" style="display:none">
      <div class="field">
        <label for="rpPassword">New password</label>
        <input type="password" id="rpPassword" placeholder="At least 6 characters" minlength="6" required />
      </div>
      <div class="field">
        <label for="rpPassword2">Confirm new password</label>
        <input type="password" id="rpPassword2" placeholder="••••••••" minlength="6" required />
      </div>
      <button type="submit" class="login-btn" id="rpBtn">Set new password</button>
      <div class="login-err" id="rpErr"></div>
      <div class="login-ok" id="rpOk"></div>
    </form>

    <div class="login-err" id="linkErr" style="display:none">
      This reset link is invalid or has expired. Request a new one from the sign-in page.
    </div>
  </div>

  <script>
    (async function () {
      // Supabase's client picks up the recovery token from the URL hash automatically
      // and fires SIGNED_IN — wait briefly for a session before deciding the link is dead.
      const session = await window.SB_AUTH.getSession();
      if (session) {
        document.getElementById('subtext').textContent = 'Choose a new password for your account.';
        document.getElementById('resetForm').style.display = 'block';
        return;
      }
      let resolved = false;
      window.SB_AUTH.onAuthChange((event, session) => {
        if (resolved) return;
        if (event === 'PASSWORD_RECOVERY' || session) {
          resolved = true;
          document.getElementById('subtext').textContent = 'Choose a new password for your account.';
          document.getElementById('resetForm').style.display = 'block';
        }
      });
      setTimeout(() => {
        if (!resolved) {
          document.getElementById('subtext').textContent = '';
          document.getElementById('linkErr').style.display = 'block';
        }
      }, 2500);
    })();

    document.getElementById('resetForm').addEventListener('submit', async function (e) {
      e.preventDefault();
      const p1 = document.getElementById('rpPassword').value;
      const p2 = document.getElementById('rpPassword2').value;
      const err = document.getElementById('rpErr');
      const ok = document.getElementById('rpOk');
      const btn = document.getElementById('rpBtn');
      err.style.display = 'none';
      ok.style.display = 'none';
      if (p1 !== p2) {
        err.textContent = "Passwords don't match.";
        err.style.display = 'block';
        return;
      }
      btn.disabled = true;
      btn.textContent = 'Saving…';
      try {
        const { error } = await window.SB_AUTH.updatePassword(p1);
        if (error) {
          err.textContent = error.message;
          err.style.display = 'block';
          return;
        }
        ok.textContent = 'Password updated — redirecting to sign in…';
        ok.style.display = 'block';
        await window.SB_AUTH.signOut();
        setTimeout(() => { window.location.href = 'login.html'; }, 1500);
      } finally {
        btn.disabled = false;
        btn.textContent = 'Set new password';
      }
    });
  </script>
</body>
</html>
