<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Storyboard — Projects</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#1B1A17" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Storyboard" />
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
<link rel="icon" href="icons/icon-192.png" type="image/png" />
<script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
<script src="parser.js"></script>
<style>
  body { background: var(--bg); }
  .dash-top {
    display: flex; align-items: center; gap: 14px;
    padding: 16px 28px;
    border-bottom: 1px solid var(--line);
    background: var(--bg-elev);
  }
  .dash-top .logo {
    width: 26px; height: 26px; border-radius: 6px;
    background: var(--ink); color: var(--bg-elev);
    display: inline-flex; align-items: center; justify-content: center;
    font-family: var(--serif); font-style: italic; font-size: 16px;
  }
  .dash-top .title { font-family: var(--serif); font-style: italic; font-size: 20px; }
  .dash-wrap { max-width: 1100px; margin: 0 auto; padding: 40px 28px 80px; }
  .dash-head { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 26px; }
  .dash-head h1 { font-family: var(--serif); font-weight: 400; font-size: 34px; margin: 0 0 4px; }
  .dash-head p { margin: 0; color: var(--ink-3); font-size: 13px; }
  .proj-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 16px;
  }
  .proj-card {
    position: relative;
    background: var(--bg-elev);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    overflow: hidden;
    cursor: pointer;
    transition: transform .15s, box-shadow .15s, border-color .15s;
  }
  .proj-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); border-color: var(--ink-4); }
  .proj-card.is-archived { opacity: .55; }
  .proj-card.is-archived:hover { opacity: .85; }
  .proj-card .cover {
    height: 110px;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--serif); font-style: italic; font-size: 30px; color: white;
    position: relative;
  }
  .proj-card .kebab-wrap { position: absolute; top: 8px; right: 8px; z-index: 5; }
  .proj-card .card-menu-btn { background: rgba(0,0,0,.28); color: #fff; }
  .proj-card .card-menu-btn:hover { background: rgba(0,0,0,.45); color: #fff; }
  .archived-toggle {
    display: flex; align-items: center; gap: 6px;
    margin: 34px 0 14px; font-size: 12.5px; color: var(--ink-3);
    background: none; border: 0; cursor: pointer; padding: 0;
  }
  .archived-toggle:hover { color: var(--ink-2); }
  .archived-toggle .chev { transition: transform .15s; }
  .archived-toggle.open .chev { transform: rotate(90deg); }
  .archived-section { display: none; }
  .archived-section.open { display: block; }
  .proj-card .body { padding: 12px 14px 14px; }
  .proj-card .name { font-size: 14.5px; font-weight: 600; margin-bottom: 3px; }
  .proj-card .meta { font-size: 11.5px; color: var(--ink-3); display: flex; align-items: center; gap: 6px; }
  .proj-card .badge {
    font-family: var(--mono); font-size: 10px; letter-spacing: .03em;
    padding: 2px 6px; border-radius: 4px; background: var(--bg-sunk); color: var(--ink-2);
  }
  .new-card {
    border: 1.5px dashed var(--line);
    border-radius: var(--radius);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 8px; min-height: 168px;
    color: var(--ink-3); cursor: pointer;
    background: transparent;
  }
  .new-card:hover { background: var(--bg-sunk); color: var(--ink-2); border-color: var(--ink-4); }
  .new-card .plus-circ {
    width: 34px; height: 34px; border-radius: 50%;
    border: 1.5px solid var(--line); display: inline-flex; align-items: center; justify-content: center;
  }
  /* new project modal reuse .modal-bg/.modal from styles.css */
  .np-body { padding: 18px 20px; display: flex; flex-direction: column; gap: 14px; }
  .np-field label { display: block; font-size: 12px; color: var(--ink-2); font-weight: 500; margin-bottom: 6px; }
  .np-field input { width: 100%; box-sizing: border-box; border: 1px solid var(--line); background: var(--bg); border-radius: 8px; padding: 9px 12px; font-size: 13.5px; outline: none; }
  .np-field input:focus { border-color: var(--ink-3); }
  .type-pick { display: flex; gap: 8px; }
  .type-pick button {
    flex: 1; padding: 10px; border-radius: 8px; border: 1px solid var(--line); background: var(--bg-elev);
    font-size: 13px; font-weight: 500; color: var(--ink-2); cursor: pointer;
  }
  .type-pick button.active { background: var(--ink); color: var(--bg-elev); border-color: var(--ink); }
  .np-dropzone { padding: 22px 16px; cursor: pointer; }
  .np-dropzone h3 { font-size: 15px; }
  .np-dropzone p { font-size: 11.5px; }
  .np-parsed {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 14px; border-radius: 8px;
    background: var(--bg-sunk); border: 1px solid var(--line);
    font-size: 12.5px;
  }
  .np-parsed .x { margin-left: auto; }
  .np-error { color: var(--danger); font-size: 12px; }
</style>
</head>
<body>
  <div class="dash-top">
    <span class="logo">S</span>
    <span class="title">Storyboard</span>
    <div style="flex:1"></div>
    <span style="font-size:12.5px;color:var(--ink-3)" id="whoami"></span>
    <button class="btn ghost" id="signOutBtn" style="font-size:12.5px">Sign out</button>
  </div>

  <div class="dash-wrap">
    <div class="dash-head">
      <div>
        <h1>Your projects</h1>
        <p>Pick a production to open its storyboard, or start a new one.</p>
      </div>
    </div>
    <div class="proj-grid" id="projGrid"></div>

    <button class="archived-toggle" id="archivedToggle" style="display:none">
      <span class="chev">›</span>
      <span id="archivedToggleLabel">Archived</span>
    </button>
    <div class="archived-section" id="archivedSection">
      <div class="proj-grid" id="archivedGrid"></div>
    </div>
  </div>

  <div class="modal-bg" id="newModalBg" style="display:none">
    <div class="modal narrow" style="flex-direction:column" onclick="event.stopPropagation()">
      <div class="modal-head">
        <div style="font-size:13px;font-weight:600">New project</div>
        <button class="modal-x" id="closeNewModal">✕</button>
      </div>
      <div class="np-body">
        <div class="np-field">
          <label>Project name</label>
          <input id="npName" placeholder="e.g. Northern Lights" />
        </div>
        <div class="np-field">
          <label>Type</label>
          <div class="type-pick">
            <button type="button" class="active" data-type="series">Series</button>
            <button type="button" data-type="film">Film</button>
          </div>
        </div>
        <div class="np-field">
          <label>Chrono Script Order (optional)</label>
          <div class="dropzone np-dropzone" id="npDropzone">
            <input type="file" id="npFileInput" accept="application/pdf" style="display:none" />
            <div id="npDropzoneIdle">
              <div class="icon" style="width:32px;height:32px;margin-bottom:6px"><span style="font-size:15px">↑</span></div>
              <h3>Drop a schedule PDF</h3>
              <p>Start the project already populated with its scenes — or skip this and import later.</p>
            </div>
            <div id="npParsing" style="display:none;font-size:12.5px;color:var(--ink-3)">Parsing schedule…</div>
          </div>
          <div id="npParsedSummary" class="np-parsed" style="display:none;margin-top:8px"></div>
          <div id="npError" class="np-error" style="display:none;margin-top:6px"></div>
        </div>
      </div>
      <div style="display:flex;justify-content:flex-end;gap:8px;padding:12px 20px;border-top:1px solid var(--line)">
        <button class="btn ghost" id="cancelNew">Cancel</button>
        <button class="btn primary" id="createNew">Create project</button>
      </div>
    </div>
  </div>

  <script>
    if (!sessionStorage.getItem('sb_auth')) window.location.href = 'login.html';
    document.getElementById('whoami').textContent = 'mira@camino-productions.com';
    document.getElementById('signOutBtn').onclick = () => {
      sessionStorage.removeItem('sb_auth');
      window.location.href = 'login.html';
    };

    const SEED = [
      { id: 'camino', name: 'The Camino', type: 'series', color: '#9C6A3F', badge: 'S1 · 4 EP', seeded: true, entry: 'index.html' },
    ];

    function loadProjects() {
      const stored = JSON.parse(localStorage.getItem('sb_projects') || '[]');
      const seedOverrides = JSON.parse(localStorage.getItem('sb_seed_overrides') || '{}');
      const seeds = SEED.map(s => ({ ...s, archived: !!(seedOverrides[s.id] && seedOverrides[s.id].archived) }));
      return [...seeds, ...stored];
    }
    function saveProjects(list) {
      const custom = list.filter(p => !p.seeded);
      localStorage.setItem('sb_projects', JSON.stringify(custom));
      const seedOverrides = {};
      list.filter(p => p.seeded).forEach(p => { seedOverrides[p.id] = { archived: !!p.archived }; });
      localStorage.setItem('sb_seed_overrides', JSON.stringify(seedOverrides));
    }

    function archiveProject(id, archived) {
      const projects = loadProjects();
      const p = projects.find(p => p.id === id);
      if (p) p.archived = archived;
      saveProjects(projects);
      render();
    }
    function deleteProject(id) {
      if (!confirm('Delete this project? This cannot be undone.')) return;
      const projects = loadProjects().filter(p => p.id !== id);
      saveProjects(projects);
      render();
    }

    let openMenuEl = null;
    function closeMenus() {
      if (openMenuEl) openMenuEl.style.display = 'none';
      openMenuEl = null;
    }
    document.addEventListener('click', closeMenus);

    function projCard(p) {
      const card = document.createElement('div');
      card.className = 'proj-card' + (p.archived ? ' is-archived' : '');
      card.innerHTML = `
        <div class="cover" style="background:${p.color}">
          ${p.name[0].toUpperCase()}
          <div class="kebab-wrap">
            <button class="card-menu-btn" title="More">⋯</button>
            <div class="card-menu" style="display:none"></div>
          </div>
        </div>
        <div class="body">
          <div class="name">${p.name}</div>
          <div class="meta"><span class="badge">${p.badge || (p.type === 'film' ? 'Film' : 'Series')}</span></div>
        </div>`;
      card.onclick = () => {
        window.location.href = p.entry || 'index.html?project=' + encodeURIComponent(p.id);
      };
      const menuBtn = card.querySelector('.card-menu-btn');
      const menu = card.querySelector('.card-menu');
      const items = [];
      if (p.archived) {
        items.push(['Restore project', () => archiveProject(p.id, false), false]);
      } else {
        items.push(['Archive project', () => archiveProject(p.id, true), false]);
      }
      if (!p.seeded) {
        items.push([p.archived ? 'Delete permanently' : 'Delete project', () => deleteProject(p.id), true]);
      }
      menu.innerHTML = items.map(([label, , danger], i) =>
        `<button data-i="${i}"${danger ? ' class="danger"' : ''}>${label}</button>`
      ).join('');
      Array.from(menu.querySelectorAll('button')).forEach((btn, i) => {
        btn.onclick = (e) => { e.stopPropagation(); closeMenus(); items[i][1](); };
      });
      menuBtn.onclick = (e) => {
        e.stopPropagation();
        const isOpen = openMenuEl === menu;
        closeMenus();
        if (!isOpen) {
          menu.style.display = 'flex';
          openMenuEl = menu;
        }
      };
      menu.onclick = (e) => e.stopPropagation();
      return card;
    }

    function render() {
      const projects = loadProjects();
      const active = projects.filter(p => !p.archived);
      const archived = projects.filter(p => p.archived);

      const grid = document.getElementById('projGrid');
      grid.innerHTML = '';
      active.forEach(p => grid.appendChild(projCard(p)));
      const newCard = document.createElement('div');
      newCard.className = 'new-card';
      newCard.innerHTML = `<span class="plus-circ">+</span><span style="font-size:13px;font-weight:500">New project</span>`;
      newCard.onclick = openModal;
      grid.appendChild(newCard);

      const toggle = document.getElementById('archivedToggle');
      const section = document.getElementById('archivedSection');
      const archivedGrid = document.getElementById('archivedGrid');
      archivedGrid.innerHTML = '';
      archived.forEach(p => archivedGrid.appendChild(projCard(p)));
      if (archived.length) {
        toggle.style.display = 'flex';
        document.getElementById('archivedToggleLabel').textContent = `Archived (${archived.length})`;
        toggle.onclick = () => {
          toggle.classList.toggle('open');
          section.classList.toggle('open');
        };
      } else {
        toggle.style.display = 'none';
        section.classList.remove('open');
        toggle.classList.remove('open');
      }
    }

    const PALETTE = ['#9C6A3F', '#3C6EB4', '#2A6F3C', '#7A5AE0', '#C04848', '#1B1B1B'];
    const EP_TITLES = { ep1: 'France', ep2: 'Yugoslavia', ep3: 'The Netherlands', ep4: 'Germany' };
    const EP_COLORS = { ep1: '#3C6EB4', ep2: '#D52B1E', ep3: '#21468B', ep4: '#1B1B1B' };

    function buildSceneObjects(parsed) {
      return parsed.map((p, i) => ({
        id: `s${i + 1}`,
        scene: p.scene,
        episode: p.episode,
        intExt: p.intExt,
        dn: p.dn,
        slug: p.slug,
        address: p.address,
        status: 'todo',
        group: null,
        photoHint: p.photoHint,
        photos: [],
        photoThumbs: [],
        notes: p.notes || '',
        comments: [],
        shootDay: null,
        shootIndex: i,
      }));
    }
    function buildEpisodesFromScenes(scenes) {
      const ids = [...new Set(scenes.map(s => s.episode))];
      return ids.map((id, i) => ({
        id, n: 100 + i + 1,
        title: EP_TITLES[id] || id,
        country: (scenes.find(s => s.episode === id) || {}).country || EP_TITLES[id] || id,
        era: '',
        color: EP_COLORS[id] || PALETTE[i % PALETTE.length],
      }));
    }
    function buildSuggestions(scenes) {
      const slugRoot = s => (s || '').split('—')[0].trim();
      const buckets = {};
      scenes.forEach(s => {
        if (s.group) return;
        const k = slugRoot(s.slug);
        if (!k) return;
        (buckets[k] = buckets[k] || []).push(s.id);
      });
      return Object.entries(buckets)
        .filter(([, ids]) => ids.length >= 2)
        .slice(0, 5)
        .map(([name, ids], i) => ({
          id: `sug${i + 1}`, name,
          reason: `${ids.length} scenes share "${name}"`,
          sceneIds: ids,
          confidence: 0.75 + i * 0.03,
        }));
    }

    let pendingImport = null; // { scenes, filename } once a PDF has been parsed

    function resetImportUI() {
      pendingImport = null;
      document.getElementById('npDropzoneIdle').style.display = 'block';
      document.getElementById('npParsing').style.display = 'none';
      document.getElementById('npParsedSummary').style.display = 'none';
      document.getElementById('npError').style.display = 'none';
      document.getElementById('npFileInput').value = '';
    }

    async function parseImportFile(file) {
      document.getElementById('npDropzoneIdle').style.display = 'none';
      document.getElementById('npError').style.display = 'none';
      document.getElementById('npParsedSummary').style.display = 'none';
      document.getElementById('npParsing').style.display = 'block';
      try {
        const scenes = await window.parseChronoPdf(file);
        document.getElementById('npParsing').style.display = 'none';
        if (!scenes.length) {
          document.getElementById('npDropzoneIdle').style.display = 'block';
          document.getElementById('npError').textContent = `No scenes recognized in "${file.name}".`;
          document.getElementById('npError').style.display = 'block';
          return;
        }
        pendingImport = { scenes, filename: file.name };
        const summary = document.getElementById('npParsedSummary');
        summary.innerHTML = `<span>📄 <b>${scenes.length} scenes</b> found in ${file.name}</span><button type="button" class="modal-x x" title="Remove">✕</button>`;
        summary.style.display = 'flex';
        summary.querySelector('.x').onclick = (e) => { e.stopPropagation(); resetImportUI(); };
      } catch (err) {
        console.error(err);
        document.getElementById('npParsing').style.display = 'none';
        document.getElementById('npDropzoneIdle').style.display = 'block';
        document.getElementById('npError').textContent = `Couldn't read "${file.name}": ${err.message || err}`;
        document.getElementById('npError').style.display = 'block';
      }
    }

    const npDropzone = document.getElementById('npDropzone');
    const npFileInput = document.getElementById('npFileInput');
    npDropzone.onclick = () => { if (!pendingImport) npFileInput.click(); };
    npDropzone.ondragover = (e) => { e.preventDefault(); npDropzone.classList.add('over'); };
    npDropzone.ondragleave = () => npDropzone.classList.remove('over');
    npDropzone.ondrop = (e) => {
      e.preventDefault();
      npDropzone.classList.remove('over');
      const f = e.dataTransfer.files[0];
      if (f) parseImportFile(f);
    };
    npFileInput.onchange = (e) => { const f = e.target.files[0]; if (f) parseImportFile(f); };

    function openModal() {
      document.getElementById('newModalBg').style.display = 'flex';
      document.getElementById('npName').value = '';
      document.getElementById('npName').focus();
      resetImportUI();
    }
    function closeModal() { document.getElementById('newModalBg').style.display = 'none'; }
    document.getElementById('newModalBg').onclick = closeModal;
    document.getElementById('closeNewModal').onclick = closeModal;
    document.getElementById('cancelNew').onclick = closeModal;

    let selType = 'series';
    document.querySelectorAll('.type-pick button').forEach(btn => {
      btn.onclick = () => {
        document.querySelectorAll('.type-pick button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selType = btn.dataset.type;
      };
    });

    function saveProjectData(id, bundle) {
      const store = JSON.parse(localStorage.getItem('sb_project_data') || '{}');
      store[id] = bundle;
      localStorage.setItem('sb_project_data', JSON.stringify(store));
    }

    document.getElementById('createNew').onclick = () => {
      const name = document.getElementById('npName').value.trim();
      if (!name) return;
      const projects = loadProjects();
      const color = PALETTE[projects.length % PALETTE.length];
      const id = 'p' + Date.now();

      const scenes = pendingImport ? buildSceneObjects(pendingImport.scenes) : [];
      saveProjectData(id, {
        name, type: selType,
        scenes,
        episodes: buildEpisodesFromScenes(scenes),
        suggestions: buildSuggestions(scenes),
      });

      const proj = { id, name, type: selType, color, entry: `index.html?project=${encodeURIComponent(id)}` };
      projects.push(proj);
      saveProjects(projects);
      closeModal();
      render();
    };

    render();
  </script>
</body>
</html>
