<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Storyboard — Shared scenes</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
<link rel="icon" href="icons/icon-192.png" type="image/png" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="supabase.js"></script>
<style>
  body { background: var(--bg); }
  .share-top {
    display: flex; align-items: center; gap: 12px;
    padding: 16px 28px; border-bottom: 1px solid var(--line); background: var(--bg-elev);
  }
  .share-top .logo {
    width: 26px; height: 26px; border-radius: 6px;
    background: var(--ink); color: var(--bg-elev);
    display: inline-flex; align-items: center; justify-content: center;
    font-family: var(--serif); font-style: italic; font-size: 16px;
  }
  .share-top .title { font-family: var(--serif); font-style: italic; font-size: 18px; }
  .share-top .badge {
    font-family: var(--mono); font-size: 10px; padding: 2px 7px; border-radius: 10px;
    background: var(--bg-sunk); color: var(--ink-2); border: 1px solid var(--line);
  }
  .share-wrap { max-width: 1400px; margin: 0 auto; padding: 28px; }
  .share-head { margin-bottom: 20px; }
  .share-head h1 { font-family: var(--serif); font-weight: 400; font-size: 30px; margin: 0 0 4px; }
  .share-head p { margin: 0; color: var(--ink-3); font-size: 13px; }
  .share-card {
    background: var(--bg-elev); border: 1px solid var(--line); border-radius: var(--radius);
    overflow: hidden; display: flex; flex-direction: column;
  }
  .share-card .ph {
    aspect-ratio: 16/9; background: var(--bg-sunk); position: relative;
    display: flex; align-items: center; justify-content: center;
    color: var(--ink-3); font-family: var(--mono); font-size: 11px; letter-spacing: .08em; text-transform: uppercase;
  }
  .share-card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; }
  .share-card .body { padding: 12px 13px; }
  .share-card .name { font-weight: 600; font-size: 14px; margin-bottom: 6px; }
  .share-card .ribbon { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }
  .share-card .scno { margin-left: auto; font-family: var(--mono); font-size: 10.5px; color: var(--ink-3); }
  .share-card .addr { font-size: 11.5px; color: var(--ink-3); margin-bottom: 6px; }
  .share-card .maps-link {
    display: inline-block; font-size: 11.5px; color: var(--accent); text-decoration: none; margin-bottom: 6px;
  }
  .share-card .maps-link:hover { text-decoration: underline; }
  .share-card .notes { font-size: 12px; color: var(--ink-2); white-space: pre-line; line-height: 1.4; }
  .share-card .scene-info { font-size: 11px; font-style: italic; color: var(--ink-4); white-space: pre-line; line-height: 1.4; margin-top: 8px; }
  .state-msg { text-align: center; padding: 80px 20px; color: var(--ink-3); }
  .comments { border-top: 1px solid var(--line-soft); padding: 10px 13px; }
  .comments .c-item { font-size: 11.5px; margin-bottom: 8px; }
  .comments .c-item .who { font-weight: 600; color: var(--ink-2); }
  .comments .c-item .when { color: var(--ink-4); font-size: 10.5px; margin-left: 4px; }
  .comments .c-item .txt { color: var(--ink-2); margin-top: 1px; }
  .comment-form { display: flex; flex-direction: column; gap: 6px; margin-top: 8px; }
  .comment-form input, .comment-form textarea {
    border: 1px solid var(--line); background: var(--bg); border-radius: 6px;
    padding: 6px 8px; font-size: 11.5px; font-family: inherit; outline: none; resize: none;
  }
  .comment-form button {
    align-self: flex-end; appearance: none; border: 0; border-radius: 6px;
    background: var(--ink); color: var(--bg-elev); font-size: 11.5px; font-weight: 600;
    padding: 5px 11px; cursor: pointer;
  }
  .comment-form button:disabled { opacity: .6; cursor: default; }
</style>
</head>
<body>
  <div class="share-top">
    <span class="logo">S</span>
    <span class="title">Storyboard</span>
    <div style="flex:1"></div>
    <span id="permBadge" class="badge" style="display:none"></span>
  </div>
  <div class="share-wrap">
    <div id="content"><div class="state-msg">Loading…</div></div>
  </div>

  <script>
    // Escapes any user-controlled string before it goes into innerHTML — scene
    // notes, addresses, and (once comments are involved) arbitrary anonymous
    // input all pass through this, since building HTML by hand from those
    // values would otherwise be a stored-XSS hole on a page anyone can post to.
    function esc(str) {
      const div = document.createElement('div');
      div.textContent = str == null ? '' : String(str);
      return div.innerHTML;
    }

    (async function () {
      const shareId = new URLSearchParams(location.search).get('s');
      const content = document.getElementById('content');
      if (!shareId) {
        content.innerHTML = '<div class="state-msg">No share link provided.</div>';
        return;
      }
      const result = await window.SB_DATA.getSharedScenes(shareId);
      if (!result) {
        content.innerHTML = '<div class="state-msg">This link is invalid or no longer available.</div>';
        return;
      }
      document.title = 'Storyboard — ' + (result.project_name || 'Shared scenes');
      const canComment = result.permission === 'comment';
      const permBadge = document.getElementById('permBadge');
      permBadge.textContent = canComment ? 'Can comment' : 'Can view';
      permBadge.style.display = 'inline-block';

      const scenes = result.scenes || [];
      const episodes = result.episodes || [];
      const findEp = (id) => episodes.find(e => e.id === id);

      const head = document.createElement('div');
      head.className = 'share-head';
      head.innerHTML = `<h1>${esc(result.project_name || 'Shared scenes')}</h1><p>${scenes.length} scene${scenes.length !== 1 ? 's' : ''} shared with you</p>`;

      const grid = document.createElement('div');
      grid.className = 'grid';
      grid.style.setProperty('--grid-cols', 4);

      function renderComments(scene, listEl) {
        listEl.innerHTML = '';
        (scene.comments || []).forEach(c => {
          const item = document.createElement('div');
          item.className = 'c-item';
          const when = c.ts ? new Date(c.ts).toLocaleString() : '';
          item.innerHTML = `<span class="who">${esc(c.user)}</span><span class="when">${esc(when)}</span><div class="txt">${esc(c.text)}</div>`;
          listEl.appendChild(item);
        });
      }

      scenes.forEach(s => {
        const ep = findEp(s.episode);
        const card = document.createElement('div');
        card.className = 'share-card';
        // Full photo, not the tiny card-cover thumbnail — this is the one
        // place people actually look closely at a location shot.
        const photo = (s.photos && s.photos[0]) || (s.photoThumbs && s.photoThumbs[0]);
        const primaryGeo = (s.photoGeo && s.photoGeo[0]) || s.geo;
        const mapsQuery = primaryGeo ? `${primaryGeo.lat},${primaryGeo.lng}` : s.address;
        const hasMapsLink = Boolean(s.mapsOverride || mapsQuery);
        card.innerHTML = `
          ${photo ? `<img src="${esc(photo)}" alt="">` : `<div class="ph">${esc(s.photoHint || '')}</div>`}
          <div class="body">
            <div class="name">${s.locationId ? `${esc(s.locationId)} · ` : ''}${esc(s.slug || '')}</div>
            <div class="ribbon">
              <span class="tag ${esc((s.intExt || '').toLowerCase().replace('+',''))}">${esc(s.intExt || '')}</span>
              <span class="tag ${esc((s.dn || '').toLowerCase())}">${esc(s.dn || '')}</span>
              <span class="scno">${ep ? `EP ${esc(ep.n)} · ` : ''}SC ${esc(String(s.scene ?? '').padStart(2,'0'))}</span>
            </div>
            ${s.address ? `<div class="addr">${esc(s.address)}</div>` : ''}
            ${hasMapsLink ? '<div class="maps-slot"></div>' : ''}
            ${s.notes ? `<div class="notes">${esc(s.notes)}</div>` : ''}
            ${s.sceneInfo ? `<div class="scene-info">${esc(s.sceneInfo)}</div>` : ''}
          </div>`;

        if (hasMapsLink) {
          // Built via the href *property* (not string-interpolated into the
          // template above) so a pasted mapsOverride value can never break
          // out of an attribute and inject markup on a page anyone can open.
          const mapsUrl = s.mapsOverride
            ? (/^https?:\/\//i.test(s.mapsOverride) ? s.mapsOverride : 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(s.mapsOverride))
            : 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(mapsQuery);
          const link = document.createElement('a');
          link.href = mapsUrl;
          link.target = '_blank';
          link.rel = 'noopener noreferrer';
          link.className = 'maps-link';
          link.textContent = 'Open in Google Maps ↗';
          card.querySelector('.maps-slot').replaceWith(link);
        }

        if (canComment) {
          const wrap = document.createElement('div');
          wrap.className = 'comments';
          const list = document.createElement('div');
          renderComments(s, list);
          wrap.appendChild(list);

          const form = document.createElement('div');
          form.className = 'comment-form';
          form.innerHTML = `
            <input type="text" placeholder="Your name" maxlength="60" />
            <textarea rows="2" placeholder="Add a comment…" maxlength="1000"></textarea>
            <button type="button">Post</button>`;
          const nameInput = form.querySelector('input');
          const textInput = form.querySelector('textarea');
          const postBtn = form.querySelector('button');
          postBtn.onclick = async () => {
            const text = textInput.value.trim();
            if (!text) return;
            postBtn.disabled = true;
            postBtn.textContent = 'Posting…';
            try {
              const saved = await window.SB_DATA.addSharedComment(shareId, s.id, nameInput.value, text);
              s.comments = [...(s.comments || []), saved];
              renderComments(s, list);
              textInput.value = '';
            } catch (err) {
              alert(err.message || "Couldn't post comment");
            } finally {
              postBtn.disabled = false;
              postBtn.textContent = 'Post';
            }
          };
          wrap.appendChild(form);
          card.appendChild(wrap);
        }

        grid.appendChild(card);
      });

      content.innerHTML = '';
      content.appendChild(head);
      if (scenes.length) {
        content.appendChild(grid);
      } else {
        const empty = document.createElement('div');
        empty.className = 'state-msg';
        empty.textContent = 'No scenes to show yet.';
        content.appendChild(empty);
      }
    })();
  </script>
</body>
</html>
